spring.application.name=java-project
server.port=8080

# ==========================================
# 1. Cấu hình MySQL JDBC (Dùng cho Project Metadata)
# ==========================================
# Tận dụng tham số truyền từ Docker-compose hoặc local .env
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:project_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pooling Settings (Tối ưu kết nối)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ==========================================
# 2. Cấu hình MongoDB (Dùng cho Comment & Reaction)
# ==========================================
# Connection_Mongo có chứa sẵn tên db và custom domain (xem ở .env)
spring.data.mongodb.uri=${Connection_Mongo}

# Log cấu hình (dùng chuẩn log native)
logging.level.root=INFO
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
