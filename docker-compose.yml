services:
  # 1. RabbitMQ (Dành cho Go Notification Worker)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ketib_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ketib_network
    restart: unless-stopped

  # 2. Redis (Cache dùng chung cho nhiều service)
  redis:
    image: redis:7-alpine
    container_name: ketib_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ketib_network
    restart: unless-stopped

  # 3. MySQL (Dành cho Java Spring Boot)
  mysql:
    image: mysql:8.0
    container_name: ketib_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      # Ánh xạ thư mục script khởi tạo MySQL
      - ./DatabaseScripts/mysql:/docker-entrypoint-initdb.d
    networks:
      - ketib_network
    restart: unless-stopped

  # 4. PostgreSQL (Dành cho C# .NET Core)
  postgres:
    image: postgres:15-alpine
    container_name: ketib_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Ánh xạ thư mục script khởi tạo PostgreSQL
      - ./DatabaseScripts/postgresql:/docker-entrypoint-initdb.d
    networks:
      - ketib_network
    restart: unless-stopped

  # 5. MongoDB (Dành cho Node.js Gateway, Python AI, và Go Chat)
  mongodb:
    image: mongo:6.0
    container_name: ketib_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
      # Ánh xạ thư mục script khởi tạo MongoDB
      - ./DatabaseScripts/mongodb:/docker-entrypoint-initdb.d
    networks:
      - ketib_network
    restart: unless-stopped
  
  # #6. dotnet-collab service
  dotnet-collab:
    build: ./dotnet-collab
    container_name: dotnet_collab_service
    ports:
      - "5166:5166"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgresConnection=Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DATABASE};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - ketib_network

# Định nghĩa các volume để dữ liệu được lưu trữ vĩnh viễn, không bị mất khi tắt Docker
volumes:
  rabbitmq_data:
  redis_data:
  mysql_data:
  postgres_data:
  mongodb_data:

# Khai báo mạng ảo dùng chung để các container có thể gọi nhau bằng container_name
networks:
  ketib_network:
    driver: bridge